name: Terraform Plan

on:
  pull_request:
    paths:
      - '.github/workflows/terraform-plan.yml'
      - 'infra/**'
      - 'scripts/check-terraform-plan.sh'
  workflow_dispatch:

concurrency:
  group: terraform-plan-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    env:
      TF_IN_AUTOMATION: 'true'
      TF_VAR_alert_email: ${{ vars.CHIEF_ALERT_EMAIL }}
      TF_VAR_backup_bucket_name: ${{ vars.CHIEF_BACKUP_BUCKET }}
      TF_VAR_discord_application_id: ${{ vars.DISCORD_APPLICATION_ID }}
      TF_VAR_discord_guild_id: ${{ vars.DISCORD_GUILD_ID }}
      TF_VAR_discord_text_channel_id: ${{ vars.DISCORD_MAIN_TEXT_CHANNEL_ID }}
      TF_VAR_discord_voice_channel_id: ${{ vars.DISCORD_MAIN_VOICE_CHANNEL_ID }}
      TF_VAR_project_id: ${{ vars.GCP_PROJECT_ID }}
      TF_VAR_region: ${{ vars.GCP_REGION }}
      TF_VAR_zone: ${{ vars.GCP_ZONE }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4
        with:
          terraform_version: 1.15.8

      - name: Validate locally
        run: |
          terraform fmt -check -recursive infra
          terraform -chdir=infra/bootstrap init -backend=false
          terraform -chdir=infra/bootstrap validate -no-color
          terraform -chdir=infra/app init -backend=false
          terraform -chdir=infra/app validate -no-color

      - name: Authenticate to Google Cloud
        if: vars.GCP_PR_WIF_PROVIDER != '' && github.event.pull_request.head.repo.full_name == github.repository
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ vars.GCP_PR_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_TF_PLAN_SERVICE_ACCOUNT }}

      - name: Plan application infrastructure
        if: vars.GCP_PR_WIF_PROVIDER != '' && github.event.pull_request.head.repo.full_name == github.repository
        working-directory: infra/app
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ vars.GCP_TERRAFORM_STATE_BUCKET }}" \
            -backend-config="prefix=production/app"
          terraform plan -input=false -lock=false -out=tfplan
          terraform show -json tfplan > tfplan.json
          ../../scripts/check-terraform-plan.sh tfplan.json
          {
            echo '### Terraform plan summary'
            echo
            jq -r '[.resource_changes[]?.change.actions | join("/")] | group_by(.)[] | "- \(.[0]): \(length)"' tfplan.json
          } >>"$GITHUB_STEP_SUMMARY"

      - name: Explain credentialed-plan skip
        if: vars.GCP_PR_WIF_PROVIDER == '' || github.event.pull_request.head.repo.full_name != github.repository
        run: |
          echo '### Terraform plan skipped' >>"$GITHUB_STEP_SUMMARY"
          echo 'Local fmt and validate passed. WIF is not bootstrapped or this is a fork.' >>"$GITHUB_STEP_SUMMARY"
